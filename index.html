<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ENTER</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .enter-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 64px;
      border-radius: 999px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.96);
      color: #111111;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.18em;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .enter-btn:active {
      transform: scale(0.98);
      opacity: 0.95;
    }

    .notes {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(120, 120, 120, 0.9);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <a id="enterBtn" class="enter-btn" rel="ar" href="lake.usdz">ENTER</a>

    <div class="notes">
      <p>Open with iPhone Safari.</p>
      <p>Best viewed in bright light on a textured surface.</p>
    </div>
  </div>

  <audio id="waterAudio" preload="auto" loop>
    <source src="water.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const btn = document.getElementById("enterBtn");
    const audio = document.getElementById("waterAudio");

    btn.addEventListener("click", () => {
      audio.play().catch(() => {});
    });
  </script>
</body>
</html>
