<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AR Lake</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: linear-gradient(180deg, #0e1f2a, #183946);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      max-width: 420px;
      padding: 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 32px;
      margin: 0 0 12px;
      letter-spacing: 1px;
    }

    p {
      font-size: 16px;
      line-height: 1.7;
      opacity: 0.88;
      margin-bottom: 28px;
    }

    a.ar-button {
      display: inline-block;
      padding: 15px 26px;
      background: #ffffff;
      color: #12313d;
      border-radius: 999px;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      opacity: 0.65;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>AR Lake</h1>
    <p>
      请使用 iPhone Safari 打开此页面。点击下方按钮后，缓慢移动手机扫描地面，将虚拟湖泊放置到现实空间中。
    </p>

    <a class="ar-button" rel="ar" href="lake.usdz">
      进入 AR 湖泊
    </a>

    <div class="note">
      建议在光线充足、有纹理的地面上测试。
    </div>
  </div>
</body>
</html>
